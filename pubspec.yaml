name: fat_burn_coach
description: 燃脂助手 - 科学减脂运动计算器
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  
  # 注释掉需要实际文件的 assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
  # 
  # fonts:
  #   - family: DinAlternate
  #     fonts:
  #       - asset: assets/fonts/DINAlternate.ttf

dependencies:
  flutter:
    sdk: flutter
  
  # UI 组件
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # 状态管理
  provider: ^6.1.1
  
  # 数据存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # 图表
  fl_chart: ^0.65.0
  
  # 工具
  intl: ^0.18.1
  url_launcher: ^6.2.1
  
  # 本地通知
  flutter_local_notifications: ^16.3.0
  
  # 权限
  permission_handler: ^11.1.0
  
  # 传感器（计步器）
  pedometer: ^4.0.2
  
  # 健康数据
  health: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: DinAlternate
      fonts:
        - asset: assets/fonts/DINAlternate.ttf
